name: build-cexar-a40-image

on:
  workflow_dispatch:
    inputs:
      runner_label:
        description: "Runner label/ID. Use ubuntu-latest for GitHub hosted fallback or a WarpBuild runner tag if available."
        required: true
        default: "ubuntu-latest"
        type: string

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/pasavee123/cexar-a40
  IMAGE_TAG_PREFIX: cuda121-torch231
  EXPERIMENT_DIR: experiments/EXP-0019-custom-a40-environment-build

jobs:
  build-and-push:
    name: Build and push CeXaR A40 image
    runs-on: ${{ inputs.runner_label }}

    steps:
      - name: Free disk space with maintained action
        uses: jlumbroso/free-disk-space@v1.3.1
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          swap-storage: true

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set image tag
        id: image
        shell: bash
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          echo "tag=${IMAGE_NAME}:${IMAGE_TAG_PREFIX}-${SHORT_SHA}" >> "${GITHUB_OUTPUT}"
          echo "full_sha_tag=${IMAGE_NAME}:${IMAGE_TAG_PREFIX}-${GITHUB_SHA}" >> "${GITHUB_OUTPUT}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Free disk space for CUDA image build
        shell: bash
        run: |
          echo "Disk before cleanup:"
          df -h
          sudo swapoff -a || true
          sudo rm -f /mnt/swapfile || true
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /usr/local/share/boost
          sudo rm -rf /usr/local/.ghcup
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          sudo rm -rf "${AGENT_TOOLSDIRECTORY:-/opt/hostedtoolcache}"
          sudo apt-get clean
          sudo rm -rf /var/lib/apt/lists/*
          docker system prune -af || true
          echo "Disk after cleanup:"
          df -h

      - name: Move Docker data root to larger /mnt volume
        shell: bash
        run: |
          echo "Docker root before move:"
          docker info --format '{{.DockerRootDir}}' || true
          sudo mkdir -p /mnt/docker
          echo '{"data-root":"/mnt/docker"}' | sudo tee /etc/docker/daemon.json
          sudo systemctl restart docker
          echo "Docker root after move:"
          docker info --format '{{.DockerRootDir}}'
          echo "Disk after Docker root move:"
          df -h

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push linux/amd64 image
        uses: docker/build-push-action@v6
        env:
          BUILDKIT_PROGRESS: plain
        with:
          context: ${{ env.EXPERIMENT_DIR }}
          file: ${{ env.EXPERIMENT_DIR }}/docker/Dockerfile
          platforms: linux/amd64
          push: true
          provenance: false
          tags: |
            ${{ steps.image.outputs.tag }}
            ${{ steps.image.outputs.full_sha_tag }}
          labels: |
            org.opencontainers.image.source=https://github.com/pasavee123/cexar-workbench
            org.opencontainers.image.description=CeXaR reproducible A40 research environment, CUDA 12.1, PyTorch 2.3.1 cu121
            org.opencontainers.image.revision=${{ github.sha }}

      - name: Write image summary
        shell: bash
        run: |
          {
            echo "## CeXaR A40 image build"
            echo ""
            echo "Pushed tags:"
            echo "- \`${{ steps.image.outputs.tag }}\`"
            echo "- \`${{ steps.image.outputs.full_sha_tag }}\`"
            echo ""
            echo "Use the full SHA tag for experiment records when possible."
          } >> "${GITHUB_STEP_SUMMARY}"
